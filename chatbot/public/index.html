<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kognitos AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="history-container">
                <div class="history-header-row">
                    <div class="history-label">Chat History</div>
                    <button id="clear-history-btn" class="clear-all-btn" title="Clear All History">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <!-- History items injected here -->
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="automation-breadcrumb">
                    <i class="fa-solid fa-bolt-lightning"></i>
                    <span id="current-chat-title">New Request</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="theme-toggle" title="Switch Theme"><i class="fa-solid fa-moon"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-share-nodes"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </header>

            <div class="chat-viewport" id="chat-history">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="brand-logo-wrapper">
                        <i class="fa-solid fa-bolt-lightning" style="font-size: 5rem; color: var(--accent);"></i>
                    </div>
                    <p>Describe your requirement in natural language. The AI will analyze and process the query.</p>
                    
                    <div class="quick-prompts">
                        <div class="prompt-card" onclick="setPrompt('Show me the list of unregistered clients')">
                            <i class="fa-solid fa-users-slash"></i>
                            <span>Unregistered client list</span>
                        </div>
                        <div class="prompt-card" onclick="setPrompt('What is the total count of clients across all ports?')">
                            <i class="fa-solid fa-calculator"></i>
                            <span>Total client aggregation</span>
                        </div>
                        <div class="prompt-card" onclick="setPrompt('Rank clients based on their inception date')">
                            <i class="fa-solid fa-arrow-down-9-1"></i>
                            <span>Sequence & Rank analysis</span>
                        </div>
                    </div>
                </div>
                <!-- Messages append here -->
            </div>

            <footer class="input-container">
                <div class="input-wrapper">
                    <div class="typing-indicator hidden" id="typing-indicator">
                        <div class="dots"><span></span><span></span><span></span></div>
                        <span id="event-text">Analyzing request...</span>
                    </div>
                    
                    <div class="input-box">
                        <textarea id="user-input" rows="1" placeholder="Type your request here..." autocomplete="off"></textarea>
                        <button id="send-btn" class="send-btn" disabled>
                            <i class="fa-solid fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
